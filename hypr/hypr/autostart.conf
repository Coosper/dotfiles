# ═════════════════════════════════════ #
#               AUTOSTART               #
# ═════════════════════════════════════ #
# Apps and daemons to run at startup

# Core background services
exec-once = xrandr --output DP-1 --primary
exec-once = systemctl --user start gnome-keyring-daemon
exec-once = systemctl --user start hyprpolkitagent
exec-once = swayosd-server

# Panels, wallpaper, and status utilities
exec-once = waybar &
exec-once = hyprpaper &
exec-once = mpris-notifier &

# Sensor panel (Kitty running btop)
exec-once = sleep 2 && hyprctl dispatch exec "[workspace name:sensors] kitty --title btop-panel -e btop"
