# ═════════════════════════════════════ #
#        WINDOWS & WORKSPACES           #
# ═════════════════════════════════════ #

# --- Global rules ---
windowrule {
    name = suppress-maximize
    suppress_event = maximize
    match:class = .*
}

# Ignore empty XWayland popups
windowrule {
    name = ignore-empty-xwayland
    no_focus = on
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    match:pin = 0
}

# Visual indicator for XWayland windows (subtle red-tinted border)
windowrule {
    name = xwayland-border
    border_color = rgba($redAlpha88) rgba($crustAlphaaa) 45deg
    match:xwayland = 1
}

# --- Modal/popup dialogs (Save As, Open File, etc.) ---
windowrule {
    name = modal-float
    float = on
    center = on
    match:modal = 1
}

# --- File pickers (xdg-desktop-portal-gtk) ---
windowrule {
    name = xdg-portal-float
    float = on
    center = on
    size = 900 600
    match:class = ^(xdg-desktop-portal-gtk)$
}

# --- Thunar dialogs ---
windowrule {
    name = thunar-dialogs
    float = on
    center = on
    match:class = ^(thunar)$
    match:title = ^(Rename.*|File Operation.*|Confirm.*|Attention|.*Properties|Create.*|Trash|Authentication)$
}

# --- Gaming ---
# gamescope wrapper
windowrule {
    name = gamescope-fullscreen
    float = on
    fullscreen = on
    no_anim = on
    border_size = 0
    match:class = ^(gamescope)$
}

# Steam/Proton native games
windowrule {
    name = steam-app-fullscreen
    float = on
    fullscreen = on
    no_anim = on
    border_size = 0
    match:class = ^(steam_app.*)$
}

# Generic Wine/Proton .exe via XWayland
windowrule {
    name = wine-exe-float
    float = on
    no_anim = on
    match:class = ^.*\.exe$
    match:xwayland = 1
}

# --- Sensor panel ---
windowrule {
    name = btop-panel
    workspace = name:sensors silent
    fullscreen = on
    border_size = 0
    no_focus = on
    match:title = ^(btop-panel)$
}

# --- Workspace bindings ---
# DP-1 (main)
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
# DP-2 (secondary)
workspace = 10, monitor:DP-2
# HDMI-A-1 (sensor panel)
workspace = name:sensors, monitor:HDMI-A-1, persistent:true