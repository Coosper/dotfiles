background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 7
    brightness = 0.3
    contrast = 0.9
    vibrancy = 0.15
    vibrancy_darkness = 0.4
}

animations {
    enabled = true
    bezier = smooth, 0.16, 1, 0.3, 1
    bezier = bounce, 0.34, 1.56, 0.64, 1
    animation = fadeIn, 1, 5, smooth
    animation = fadeOut, 1, 5, smooth
    animation = labelAppear, 1, 7, bounce
    animation = labelDisappear, 1, 5, smooth
}

# ── avatar ─────────────────────────────────────────────

image {
    monitor =
    path = ~/.face
    size = 90
    rounding = -1
    border_size = 2
    border_color = rgba(203, 166, 247, 0.6)
    position = 0, 340
    halign = center
    valign = center
}

# ── greeting ───────────────────────────────────────────

label {
    monitor =
    text = cmd[update:60000] echo "$(python3 -c "
import datetime
h = datetime.datetime.now().hour
print('Good morning,' if 5 <= h < 12 else 'Good afternoon,' if 12 <= h < 18 else 'Good evening,' if 18 <= h < 22 else 'Good night,')
")"
    font_size = 13
    font_family = DepartureMono Nerd Font
    color = rgba(180, 190, 254, 0.6)
    position = 0, 240
    halign = center
    valign = center
}

# ── username ───────────────────────────────────────────

label {
    monitor =
    text = cmd[update:0] echo "$(getent passwd $(whoami) | cut -d: -f5 | cut -d, -f1 | grep -q '[a-zA-Z]' && getent passwd $(whoami) | cut -d: -f5 | cut -d, -f1 || whoami)"
    font_size = 16
    font_family = DepartureMono Nerd Font
    color = rgba(205, 214, 244, 0.75)
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.4)
    position = 0, 205
    halign = center
    valign = center
}

# ── separator ──────────────────────────────────────────

label {
    monitor =
    text = ──────────────────
    font_size = 10
    font_family = DepartureMono Nerd Font
    color = rgba(203, 166, 247, 0.15)
    position = 0, 165
    halign = center
    valign = center
}

# ── clock ──────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 96
    font_family = DepartureMono Nerd Font
    color = rgba(205, 214, 244, 0.95)
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, 60
    halign = center
    valign = center
}

# ── date ───────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    font_size = 14
    font_family = DepartureMono Nerd Font
    color = rgba(166, 173, 200, 0.55)
    position = 0, -28
    halign = center
    valign = center
}

# ── separator ──────────────────────────────────────────

label {
    monitor =
    text = ──────────────────
    font_size = 10
    font_family = DepartureMono Nerd Font
    color = rgba(203, 166, 247, 0.15)
    position = 0, -68
    halign = center
    valign = center
}

# ── uptime ─────────────────────────────────────────────

label {
    monitor =
    text = cmd[update:60000] echo "󰔚 $(uptime -p | sed 's/up //')"
    font_size = 12
    font_family = DepartureMono Nerd Font
    color = rgba(148, 226, 213, 0.45)
    position = 0, -98
    halign = center
    valign = center
}

# ── shutdown message ───────────────────────────────────

label {
    monitor =
    text = cmd[update:600] echo "$(python3 -c "import time; frames=['Restarting .','Restarting . .','Restarting . . .']; print(frames[int(time.time()*1.6)%3])")"
    font_size = 13
    font_family = DepartureMono Nerd Font
    color = rgba(166, 173, 200, 0.45)
    position = 0, -155
    halign = center
    valign = center
}